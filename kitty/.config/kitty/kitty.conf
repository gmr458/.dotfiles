include ./fonts/geistmonosmall.conf
include ./keymaps.conf

background_opacity 0.9

# thinner lines
box_drawing_scale 0.001, 0.1, 1.5, 2

# better font rendering
text_composition_strategy legacy

shell_integration no-cursor
cursor_shape underline
cursor_underline_thickness 1.0

enabled_layouts splits

# appearance
tab_title_template " {index}:{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title} "
tab_separator ""
tab_bar_style separator
tab_bar_align left
window_border_width 1px
modify_font underline_thickness 50%

allow_remote_control yes
listen_on unix:@mykitty

# BEGIN_KITTY_THEME
# dark
include current-theme.conf
# END_KITTY_THEME
