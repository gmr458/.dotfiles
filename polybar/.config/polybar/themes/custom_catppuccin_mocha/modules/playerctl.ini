[module/playerctl]
type = custom/script
interval = 0.5

exec = $HOME/.config/polybar/scripts/playerctl/playerctl.sh
; exec = $HOME/.config/polybar/scripts/playerctl/playerctl
; exec = $HOME/.config/polybar/scripts/playerctl/rust/target/release/rust
format-prefix-padding = 1
label = %{T2}%output%%{T-}
label-foreground = ${colors.purple}
; label-padding = 1
