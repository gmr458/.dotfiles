[module/battery]
type = internal/battery
; battery = BAT1
; adapter = ACAD
; full-at = 98

format-charging = <label-charging>
format-charging-padding = 1
format-charging-prefix = %{T2}󰂄 %{T-}
format-charging-prefix-foreground = ${colors.green}
label-charging = %{T2}%percentage%%%{T-}
; label-charging-padding = 1
label-charging-foreground = ${colors.fg}

format-discharging = <label-discharging>
format-discharging-padding = 1
format-discharging-prefix = %{T2}󰂁 %{T-}
format-discharging-prefix-foreground = ${colors.blue}
label-discharging = %{T2}%percentage%%%{T-}
; label-discharging-padding = 1
label-discharging-foreground = ${colors.fg}

format-full = <label-full>
format-full-padding = 1
format-full-prefix = %{T2}󱟢 %{T-}
format-full-prefix-foreground = ${colors.green}
label-full = %{T2}%percentage%%%{T-}
; label-full-padding = 1
label-full-foreground = ${colors.fg}
