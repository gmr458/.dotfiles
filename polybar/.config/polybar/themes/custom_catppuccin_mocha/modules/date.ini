[module/date]
type = internal/date
interval = 1

; time = 箚꺆 %a, %b %d - 箚쪛 %I:%M
time = 箚쪛 %I:%M %p
time-alt = 箚즴 %A, %B %d - 箚쪛 %I:%M:%S %p

format = <label>
; format-prefix = %{T2}Date%{T-}
; format-prefix-foreground = ${colors.fg-alt}
format-padding = 1
label = %{T2}%time%%{T-}
; label-padding = 1
