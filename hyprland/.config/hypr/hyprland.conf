### Variables: For all categories, see https://wiki.hyprland.org/Configuring/Variables/

### Sections:

### https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # Description: mouse sensitivity (legacy, may cause bugs if not 1, prefer input:sensitivity)
    # Type: float
    # Default: 1.0
    # sensitivity = 1.0
    
    # Description: self-explanatory
    # Type: int
    # Default: 1
    border_size = 2

    # Description: disable borders for floating windows
    # Type: bool
    # Default: false
    # no_border_on_floating = false

    # Description: gaps between windows
    # Type: int
    # Default: 5
    gaps_in = 3

    # Description: gaps between windows and monitor edges
    # Type: int
    # Default: 20
    gaps_out = 5
    
    # Description: self-explanatory
    # Type: color
    # Default: 0xffffffff
    col.inactive_border = 0xff1E1E2E

    # Description: self-explanatory
    # Type: color
    # Default: 0xff444444
    col.active_border = 0xffCDD6F4

    # Description: in seconds, after how many seconds of cursor’s inactivity to hide it. Set to 0 for never.
    # Type: int
    # Default: 0
    # cursor_inactive_timeout = 0

    # Description: which layout to use. (Available: dwindle, master)
    # Type: str
    # Default: dwindle
    # layout = dwindle

    # Description: if true, will not warp the cursor in many cases (focusing, keybinds, etc)
    # Type: bool
    # Default: false
    # no_cursor_warps = false

    # Description: if on, will also apply the sensitivity to raw mouse output (e.g. sensitivity in games) NOTICE: really not recommended.
    # Type: bool
    # Default: false
    # apply_sens_to_raw = false
}

### https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Description: rounded corners’ radius (in layout px)
    # Type: int
    # Default: 0
    rounding = 0

    # Description: enable antialiasing (no-jaggies) for rounded corners
    # Type: bool
    # Default: true
    # multisample_edges = true

    # Description: self-explanatory, only for windows. (0.0 - 1.0)
    # Type: float
    # Default: 1.0
    # active_opacity = 1.0

    # Description: self-explanatory, only for windows. (0.0 - 1.0)
    # Type: float
    # Default: 1.0
    # inactive_opacity = 1.0

    # Description: self-explanatory, only for windows. (0.0 - 1.0)
    # Type: float
    # Default: 1.0
    # fullscreen_opacity = 1.0

    # Description: enable kawase window background blur
    # Type: bool
    # Default: true
    # blur = true

    # Description: blur size (distance)
    # Type: int
    # Default: 8
    blur_size = 3

    # Description: the amount of passes to perform
    # Type: int
    # Default: 1
    # blur_passes = 1

    # Description: make the blur layer ignore the opacity of the window
    # Type: bool
    # Default: false
    # blur_ignore_opacity = false

    # Description: whether to enable further optimizations to the blur. Recommended to turn on, as it will massively improve performance, but some people have experienced graphical issues
    # Type: bool
    # Default: false
    blur_new_optimizations = true

    # Description: enable drop shadows on windows
    # Type: bool
    # Default: true
    # drop_shadow = true

    # Description: Shadow range (“size”) in layout px
    # Type: int
    # Default: 4
    shadow_range = 30

    # Description: (1 - 4), in what power to render the falloff (more power, the faster the falloff)
    # Type: int
    # Default: 3
    shadow_render_power = 2

    # Description: if true, the shadow will not be rendered behind the window itself, only around it.
    # Type: bool
    # Default: true
    # shadow_ignore_window = true

    # Description: shadow’s color. Alpha dictates shadow’s opacity.
    # Type: color
    # Default: 0xee1a1a1a
    col.shadow = 0xbb1E1E2E

    # Description: inactive shadow color. (if not set, will fall back to col.shadow)
    # Type: color
    # Default: unset
    # col.shadow_inactive = 

    # Description: shadow’s rendering offset.
    # Type: vec2
    # Default: [0, 0]
    # shadow_offset = [0, 0]

    # Description: shadow’s scale. 0.0 - 1.0
    # Type: float
    # Default: 1.0
    # shadow_scale = 1.0 # ERROR: No such field.

    # Description: enables dimming of inactive windows
    # Type: bool
    # Default: false
    # dim_inactive = false

    # Description: how much inactive windows should be dimmed, 0.0 - 1.0
    # Type: float
    # Default: 0.5
    # dim_strength = 0.5
}

### https://wiki.hyprland.org/Configuring/Variables/#animations
### https://wiki.hyprland.org/Configuring/Animations/
animations {
    # Description: enable animations
    # Type: bool
    # Default: true
    # enabled = true

    # Description: enable fade transitions for resize animations
    # Type: bool
    # Default: false
    # use_resize_transitions = false # ERROR: No such field.

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    # -------------------------------------------------------------------------

    # windows - styles: slide, popin
    animation = windows , 1 , 9 , myBezier

    # windowsIn - window open
    animation = windowsIn , 1 , 9 , default , slide

    # windowsOut - window close
    animation = windowsOut , 1 , 9 , default , slide

    # windowsMove - everything in between, moving, dragging, resizing.

    # -------------------------------------------------------------------------

    # fade

    # fadeIn - fade in (open) -> layers and windows
    animation = fadeIn  , 1 , 9 , default

    # fadeOut - fade out (close) -> layers and windows
    animation = fadeOut , 1 , 9 , default

    # fadeSwitch - fade on changing activewindow and its opacity
    # fadeShadow - fade on changing activewindow for shadows
    # fadeDim - the easing of the dimming of inactive windows

    # -------------------------------------------------------------------------

    # border
    animation = border , 1 , 1 , default

    # -------------------------------------------------------------------------

    # workspaces - styles: slide, slidevert, fade
    animation = workspaces , 1 ,  10 , default  , slide
}

### https://wiki.hyprland.org/Configuring/Variables/#input
input {
    # Description: Appropriate XKB keymap parameter. See the note below.
    # Type: str
    # Default: [EMPTY]
    # kb_model =

    # Description: Appropriate XKB keymap parameter
    # Type: str
    # Default: us
    kb_layout = latam

    # Description: Appropriate XKB keymap parameter
    # Type: str
    # Default: [EMPTY]
    # kb_variant =

    # Description: Appropriate XKB keymap parameter
    # Type: str
    # Default: [EMPTY]
    # kb_options =

    # Description: Appropriate XKB keymap parameter
    # Type: str
    # Default: [EMPTY]
    # kb_rules =

    # Description: If you prefer, you can use a path to your custom .xkb file.
    # Type: str
    # Default: [EMPTY]
    # kb_file =

    # Description: Engage numlock by default.
    # Type: bool
    # Default: false
    # numlock_by_default = false

    # Description: The repeat rate for held-down keys, in repeats per second.
    # Type: int
    # Default: 25
    repeat_rate = 32

    # Description: Delay before a held-down key is repeated, in milliseconds.
    # Type: int
    # Default: 600
    repeat_delay = 200

    # Description: Sets the mouse input sensitivity. Value will be clamped to the range -1.0 to 1.0. libinput#pointer-acceleration
    # Type: float
    # Default: 0.0
    # sensitivity = 0.0

    # Description: Sets the cursor acceleration profile. Can be one of adaptive, flat. Leave empty to use libinput’s default mode for your input device. libinput#pointer-acceleration
    # Type: str
    # Default: [EMPTY]
    # accel_profile = 

    # Description: Force no cursor acceleration. This bypasses most of your pointer settings to get as raw of a signal as possible. Enabling this is not recommended due to potential cursor desynchronization.
    # Type: bool
    # Default: false
    # force_no_accel = false

    # Description: Switches RMB and LMB
    # Type: bool
    # Default: false
    # left_handed = false

    # Description: Sets the scroll method. Can be one of 2fg (2 fingers), edge, on_button_down, no_scroll. libinput#scrolling
    # Type: str
    # Default: [EMPTY]
    # scroll_method = 

    # Description: Inverts scrolling direction. When enabled, scrolling moves content directly instead of manipulating a scrollbar.
    # Type: bool
    # Default: false
    # natural_scroll = false

    # Description: (0/1/2/3) Specify if and how cursor movement should affect window focus. See the note below.
    # Type: int
    # Default: 1
    follow_mouse = 1

    # Description: If enabled (1 or 2), focus will change to the window under the cursor when changing from tiled-to-floating and vice versa. If 2, focus will also follow mouse on float-to-float switches.
    # Type: int
    # Default: 1
    # float_switch_override_focus = 1

    # https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        # Description: Disable the touchpad while typing.
        # Type: bool
        # Default: true
        # disable_while_typing = true

        # Description: Inverts scrolling direction. When enabled, scrolling moves content directly instead of manipulating a scrollbar.
        # Type: bool
        # Default: false
        natural_scroll = true

        # Description: Multiplier applied to the amount of scroll movement.
        # Type: float
        # Default: 1.0
        # scroll_factor = 1.0

        # Description: Sending LMB and RMB simultaneously will be interpreted as a middle click. This disables any touchpad area that would normally send a middle click based on location. libinput#middle-button-emulation
        # Type: bool
        # Default: false
        middle_button_emulation = false

        # Description: Button presses with 1, 2, or 3 fingers will be mapped to LMB, RMB, and MMB respectively. This disables interpretation of clicks based on location on the touchpad. libinput#clickfinger-behavior
        # Type: bool
        # Default: false
        # clickfinger_behavior = false

        # Description: Tapping on the touchpad with 1, 2, or 3 fingers will send LMB, RMB, and MMB respectively.
        # Type: bool
        # Default: true
        # tap-to-click = true

        # Description: When enabled, lifting the finger off for a short time while dragging will not drop the dragged item. libinput#tap-and-drag
        # Type: bool
        # Default: false
        # drag_lock =  false
    }

    # https://wiki.hyprland.org/Configuring/Variables/#touchdevice
    # touchdevice {
        # Description: transform the input from touchdevices. The possible transformations are the same as those of the monitors
        # Type: int
        # Default: 0
        # transform = 0

        # Description: the output to bind touch devices. Empty means unset and will use the current / autodetected.
        # Type: string
        # Default: [EMPTY]
        # output =
    # }
}

### https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    # Description: enable workspace swipe gesture
    # Type: bool
    # Default: false
    workspace_swipe = true

    # Description: how many fingers for the gesture
    # Type: int
    # Default: 3
    # workspace_swipe_fingers = 3

    # Description: in px, the distance of the gesture
    # Type: int
    # Default: 300
    # workspace_swipe_distance = 300

    # Description: invert the direction
    # Type: bool
    # Default: true
    # workspace_swipe_invert = true

    # Description: minimum speed in px per timepoint to force the change ignoring cancel_ratio. Setting to 0 will disable this mechanic.
    # Type: int
    # Default: 30
    # workspace_swipe_min_speed_to_force = 30

    # Description: (0.0 - 1.0) how much the swipe has to proceed in order to commence it. (0.7 -> if > 0.7 * distance, switch, if less, revert)
    # Type: float
    # Default: 0.5
    # workspace_swipe_cancel_ratio = 0.5

    # Description: whether a swipe right on the last workspace should create a new one.
    # Type: bool
    # Default: true
    # workspace_swipe_create_new = true

    # Description: if enabled, swiping will not clamp at the neighboring workspaces but continue to the further ones.
    # Type: bool
    # Default: false
    # workspace_swipe_forever = false
}

### https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    # Description: disables the hyprland logo background. :(
    # Type: bool
    # Default: false
    disable_hyprland_logo = true
}

### https://wiki.hyprland.org/Configuring/Variables/#binds
binds {
    # Description: if disabled, will not pass the mouse events to apps / dragging windows around if a keybind has been triggered.
    # Type: bool
    # Default: false
    pass_mouse_when_bound = false
}

# -----------------------------------------------------------------------------

### Dwindle Layout: https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    # Description: enable pseudotiling. Pseudotiled windows retain their floating size when tiled.
    # Type: bool
    # Default: false
    pseudotile = true

    # Description: if enabled, the split (side/top) will not change regardless of what happens to the container.
    # Type: bool
    # Default: false
    preserve_split = true
}

# -----------------------------------------------------------------------------

### Master Layout: https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    # Description: whether a newly open window should replace the master or join the slaves.
    # Type: bool
    # Default: false
    new_is_master = true
}


