### Example per-device config
### See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic mouse V1 {
#     sensitivity = -0.5
# }

# -----------------------------------------------------------------------------

### Keywords: https://wiki.hyprland.org/Configuring/Keywords
$mainMod = SUPER

### Binds: https://wiki.hyprland.org/Configuring/Binds
bind = $mainMod , C , killactive     ,
bind = $mainMod , M , exit           ,
bind = $mainMod , V , togglefloating ,

# -----------------------------------------------------------------------------

### Wofi
# bind = $mainMod , R , exec , wofi --show drun
# bind = $mainMod , D , exec , wofi --show run

# -----------------------------------------------------------------------------

### Tofi
bind = $mainMod , R , exec , ~/.config/tofi/scripts/drun.sh      -b rect -t $theme
bind = $mainMod , D , exec , ~/.config/tofi/scripts/run.sh       -b rect -t $theme
bind = $mainMod , P , exec , ~/.config/tofi/scripts/powermenu.sh -b rect -t $theme

# -----------------------------------------------------------------------------

### Move focus with mainMod + arrow keys
bind = $mainMod , left  , movefocus, l
bind = $mainMod , h     , movefocus, l

bind = $mainMod , right , movefocus, r
bind = $mainMod , l     , movefocus, r

bind = $mainMod , up    , movefocus, u
bind = $mainMod , k     , movefocus, u

bind = $mainMod , down  , movefocus, d
bind = $mainMod , j     , movefocus, d

### Switch workspaces with mainMod + [0-9]
bind = $mainMod , 1 , workspace , 1
bind = $mainMod , 2 , workspace , 2
bind = $mainMod , 3 , workspace , 3
bind = $mainMod , 4 , workspace , 4
bind = $mainMod , 5 , workspace , 5
bind = $mainMod , 6 , workspace , 6
bind = $mainMod , 7 , workspace , 7
bind = $mainMod , 8 , workspace , 8
bind = $mainMod , 9 , workspace , 9
bind = $mainMod , 0 , workspace , 1

### Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = ALT , 1 , movetoworkspace , 1
bind = ALT , 2 , movetoworkspace , 2
bind = ALT , 3 , movetoworkspace , 3
bind = ALT , 4 , movetoworkspace , 4
bind = ALT , 5 , movetoworkspace , 5
bind = ALT , 6 , movetoworkspace , 6
bind = ALT , 7 , movetoworkspace , 7
bind = ALT , 8 , movetoworkspace , 8
bind = ALT , 9 , movetoworkspace , 9
bind = ALT , 0 , movetoworkspace , 1

### Scroll through existing workspaces with mainMod + scroll
bind = $mainMod , mouse_down , workspace, e+1
bind = $mainMod , mouse_up   , workspace, e-1

### Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod , mouse:272 , movewindow
bindm = $mainMod , mouse:273 , resizewindow

# -----------------------------------------------------------------------------

windowrule = float , Rofi
windowrule = tile  , Spotify

# -----------------------------------------------------------------------------

### Brightness
bind = , XF86MonBrightnessUp   , exec , brightnessctl set +5% && ~/.config/dunst/scripts/show_brightness.sh
bind = , XF86MonBrightnessDown , exec , brightnessctl set 5%- && ~/.config/dunst/scripts/show_brightness.sh

# -----------------------------------------------------------------------------

### Media player controls
bind = , XF86AudioPlay  , exec , playerctl play-pause
bind = , XF86AudioPause , exec , playerctl play-pause
bind = , XF86AudioNext  , exec , playerctl next
bind = , XF86AudioPrev  , exec , playerctl previous

# -----------------------------------------------------------------------------

### Volume
bind = , XF86AudioRaiseVolume , exec , pactl set-sink-volume @DEFAULT_SINK@   +5%    && ~/.config/dunst/scripts/show_volume.sh
bind = , XF86AudioLowerVolume , exec , pactl set-sink-volume @DEFAULT_SINK@   -5%    && ~/.config/dunst/scripts/show_volume.sh
bind = , XF86AudioMute        , exec , pactl set-sink-mute   @DEFAULT_SINK@   toggle && ~/.config/dunst/scripts/show_mute.sh
bind = , XF86AudioMicMute     , exec , pactl set-source-mute @DEFAULT_SOURCE@ toggle

# -----------------------------------------------------------------------------

### SwayLock
bind = SUPERSHIFT , l , exec , swaylock --config ~/.config/swaylock/config_$theme

# -----------------------------------------------------------------------------

### Screenshots
bind =          , Print , exec , grim -l 0
bind = $mainMod , Print , exec , grim -l 0 -g "$(slurp)"

# -----------------------------------------------------------------------------

### Open programs
bind = $mainMod , RETURN , exec , alacritty
bind = $mainMod , f      , exec , firefox
