### Dwindle Layout: https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    # Description: enable pseudotiling. Pseudotiled windows retain their floating size when tiled.
    # Type: bool
    # Default: false
    # pseudotile = false

    # Description: 0 -> split follows mouse, 1 -> always split to the left (new = left or top) 2 -> always split to the right (new = right or bottom)
    # Type: int
    # Default: 0
    force_split = 2

    # Description: if enabled, the split (side/top) will not change regardless of what happens to the container.
    # Type: bool
    # Default: false
    preserve_split = true

    # Description: 0 - 1 -> specifies the scale factor of windows on the special workspace
    # Type: float
    # Default: 0.8
    # special_scale_factor = 0.8

    # Description: specifies the auto-split width multiplier
    # Type: float
    # Default: 1.0
    # split_width_multiplier = 1.0

    # Description: whether to apply gaps when there is only one window on a workspace, aka. smart gaps.
    # Type: bool
    # Default: false
    # no_gaps_when_only = false

    # Description: whether to prefer the active window or the mouse position for splits
    # Type: bool
    # Default: true
    # use_active_for_splits = true

    # Description: the default split ratio on window open. 1 means even 50/50 split. 0.1 - 1.9 
    # Type: float
    # Default: 1.0
    # default_split_ratio = 1.0
}

# -----------------------------------------------------------------------------

### Master Layout: https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    # Description: (0.0 - 1.0) the scale of the special workspace windows
    # Type: float
    # Default: 0.8
    # special_scale_factor = 0.8

    # Description: (0.0 - 1.0) master split factor, the ratio of master split
    # Type: float
    # Default: 0.55
    # mfact = 0.55

    # Description: whether a newly open window should replace the master or join the slaves.
    # Type: bool
    # Default: true
    # new_is_master = true

    # Description: whether a newly open window should be on the top of the stack
    # Type: bool
    # Default: false
    # new_on_top = false

    # Description: whether to apply gaps when there is only one window on a workspace, aka. smart gaps.
    # Type: bool
    # Default: false
    # no_gaps_when_only = false

    # Description: default placement of the master area, can be left, right, top or bottom
    # Type: string
    # Default: left
    # orientation = left

    # Description: inherit fullscreen status when cycling/swapping to another window (e.g. monocle layout)
    # Type: bool
    # Default: true
    # inherit_fullscreen = true

    # Description: when using orientation=center, keep the master window centered, even when it is the only window in the workspace
    # Type: bool
    # Default: false
    # always_center_master = false
}

