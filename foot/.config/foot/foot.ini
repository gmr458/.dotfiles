# -*- conf -*-

# shell=$SHELL (if set, otherwise user's default shell from /etc/passwd)
# term=foot (or xterm-256color if built with -Dterminfo=disabled)
# login-shell=no

# app-id=foot # globally set wayland app-id. Default values are "foot" and "footclient" for desktop and server mode
# title=foot
# locked-title=no

# Consolas Nerd Font Mono
# font=Consolas Nerd Font Mono:size=11
# font-bold=Consolas Nerd Font Mono:size=11
# font-italic=Consolas Nerd Font Mono:size=11
# font-bold-italic=Consolas Nerd Font Mono:size=11

# Caskaydia Cove Nerd Font Mono
# font=Caskaydia Cove Nerd Font Mono:size=10.5
# font-bold=Caskaydia Cove Nerd Font Mono:size=10.5
# font-italic=Caskaydia Cove Nerd Font Mono Italic:size=10.5
# font-bold-italic=Caskaydia Cove Nerd Font Mono Italic:size=10.5

# Roboto Mono Nerd Font Mono
# font=Roboto Mono Nerd Font Mono:size=10.5
# font-bold=Roboto Mono Nerd Font Mono:size=10.5
# font-italic=Roboto Mono Nerd Font Mono Italic:size=10.5
# font-bold-italic=Roboto Mono Nerd Font Mono Italic:size=10.5

# Iosevka Raven Nerd Font Mono
font=Iosevka Raven Nerd Font Mono:size=12
font-bold=Iosevka Raven Nerd Font Mono:size=12
font-italic=Roboto Iosevka Raven Font Mono Italic:size=12
font-bold-italic=Iosevka Raven Nerd Font Mono Italic:size=12

# font-size-adjustment=0.5
# line-height=<font metrics>
# letter-spacing=0
# horizontal-letter-offset=0
# vertical-letter-offset=0
# underline-offset=<font metrics>
# underline-thickness=<font underline thickness>
# box-drawings-uses-font-glyphs=no
# dpi-aware=no

# initial-window-size-pixels=700x500  # Or,
# initial-window-size-chars=<COLSxROWS>
# initial-window-mode=windowed
pad=8x0center                             # optionally append 'center'
# resize-delay-ms=100

# notify=notify-send -a ${app-id} -i ${app-id} ${title} ${body}

# bold-text-in-bright=no
# word-delimiters=,│`|:"'()[]{}<>
# selection-target=primary
# workers=<number of logical CPUs>
# utmp-helper=/usr/lib/utempter/utempter  # When utmp backend is ‘libutempter’ (Linux)
# utmp-helper=/usr/libexec/ulog-helper    # When utmp backend is ‘ulog’ (FreeBSD)

[environment]
# name=value

[bell]
# urgent=no
# notify=no
# command=
# command-focused=no

[scrollback]
# lines=1000
# multiplier=3.0
# indicator-position=relative
# indicator-format=""

[url]
# launch=xdg-open ${url}
# label-letters=sadfjklewcmpgh
# osc8-underline=url-mode
# protocols=http, https, ftp, ftps, file, gemini, gopher
# uri-characters=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_.,~:;/?#@!$&%*+="'()[]

[cursor]
style=underline
# color=<inverse foreground/background>
# blink=no
# beam-thickness=1.5
# underline-thickness=<font underline thickness>

[mouse]
# hide-when-typing=no
# alternate-scroll-mode=yes

[touch]
# long-press-delay=400

[colors]
alpha=0.5

# ---------------------------------------------
# VSCode Dark Modern

# background=1f1f1f
background=000000
foreground=cccccc

## Normal/regular colors (color palette 0-7)
regular0=000000  # black
regular1=cd3131  # red
regular2=0dbc79  # green
regular3=e5e510  # yellow
regular4=2472c8  # blue
regular5=bc3fbc  # magenta
regular6=11a8cd  # cyan
regular7=e5e5e5  # white

## Bright colors (color palette 8-15)
bright0=666666   # bright black
bright1=f14c4c   # bright red
bright2=23d18b   # bright green
bright3=f5f543   # bright yellow
bright4=3b8eea   # bright blue
bright5=d670d6   # bright magenta
bright6=29b8db   # bright cyan
bright7=e5e5e5   # bright white

# ---------------------------------------------
# VSCode Light Modern

# background=ffffff
# foreground=3b3b3b

## Normal/regular colors (color palette 0-7)
# regular0=000000  # black
# regular1=cd3131  # red
# regular2=0dbc00  # green
# regular3=949800  # yellow
# regular4=0451a5  # blue
# regular5=bc05bc  # magenta
# regular6=0598bc  # cyan
# regular7=555555  # white

## Bright colors (color palette 8-15)
# bright0=666666   # bright black
# bright1=cd3131   # bright red
# bright2=14ce14   # bright green
# bright3=b5ba00   # bright yellow
# bright4=0451a5   # bright blue
# bright5=bc05bc   # bright magenta
# bright6=0598bc   # bright cyan
# bright7=a5a5a5   # bright white

## dimmed colors (see foot.ini(5) man page)
# dim0=<not set>
# ...
# dim7=<not-set>

## The remaining 256-color palette
# 16 = <256-color palette #16>
# ...
# 255 = <256-color palette #255>

## Misc colors
selection-foreground=cccccc
selection-background=264f78
# jump-labels=<regular0> <regular3>          # black-on-yellow
# scrollback-indicator=<regular0> <bright4>  # black-on-bright-blue
# search-box-no-match=<regular0> <regular1>  # black-on-red
# search-box-match=<regular0> <regular3>     # black-on-yellow
# urls=<regular3>

